<!DOCTYPE html>
<html>
<head>
  <title>My Personal Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f6ff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
    }

    .container {
      padding: 40px;
    }

    h1 {
      color: #2c3e50;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      margin-top: 40px;
      padding: 10px;
      background: #2c3e50;
      color: white;
    }
  </style>

</head>

<body>

  <header>
    <h2>My Personal Website</h2>
  </header>

  <div class="container">

    <h1>Hello! I'm [Your Name]</h1>
    <p>Welcome to my first styled website 🌐</p>

    <div class="card">
      <h2>About Me</h2>
      <p>I am learning how to build websites step by step.</p>
    </div>

    <div class="card">
      <h2>My Skills</h2>
      <p>HTML, CSS, and soon JavaScript 🚀</p>
    </div>

  </div>

  <footer>
    <p>Made by Me © 2026</p>
  </footer>

</body>
</html>
